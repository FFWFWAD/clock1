<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>終端監獄時鐘 - 倒數功能完全版</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Noto+Sans+TC:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #050202; 
      --panel: #0a0a0a; 
      --border: #331111; 
      --accent: #ff0000; 
      --text: #e2e8f0;
      --dim: #666666;
      --glow: 0 0 15px rgba(255, 0, 0, 0.7), 0 0 30px rgba(255, 0, 0, 0.3);
    }

    body {
      background: var(--bg); color: var(--text);
      font-family: 'Noto Sans TC', sans-serif;
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; overflow: hidden;
    }

    /* ── 背景雷射效果 ── */
    .laser-bg { position: absolute; inset: 0; z-index: 0; background: radial-gradient(circle at center, #1a0505 0%, #050202 100%); }
    .laser-line { position: absolute; top: 50%; left: 0; width: 100%; height: 2px; background: var(--accent); box-shadow: 0 0 20px var(--accent); opacity: 0.4; z-index: 1; }
    .scan-line { position: absolute; width: 100%; height: 100%; background: linear-gradient(0deg, transparent 0%, rgba(255,0,0,0.05) 50%, transparent 100%); top: -100%; animation: scan 4s linear infinite; }
    @keyframes scan { 0% { top: -100%; } 100% { top: 100%; } }

    .container { position: relative; z-index: 2; display: flex; flex-direction: column; align-items: center; gap: 20px; padding: 32px 16px; width: min(800px, 96vw); }

    /* ── 模式切換 ── */
    .mode-switcher { display: flex; background: rgba(0,0,0,0.8); border: 1px solid var(--border); border-radius: 4px; overflow: hidden; }
    .mode-btn { font-family: 'Orbitron'; font-size: 0.8rem; padding: 10px 24px; border: none; background: transparent; color: var(--dim); cursor: pointer; transition: 0.3s; }
    .mode-btn.active { color: var(--accent); background: rgba(255,0,0,0.1); text-shadow: 0 0 8px var(--accent); }

    /* ── 數位時鐘 ── */
    .digital { display: flex; align-items: center; gap: 5px; padding: 10px; }
    .d { font-family: 'Orbitron'; font-weight: 900; font-size: clamp(2.6rem, 12.5vw, 8.5rem); color: var(--accent); text-shadow: var(--glow); }
    .colon { font-family: 'Orbitron'; font-size: clamp(2rem, 9vw, 6rem); color: var(--accent); text-shadow: var(--glow); animation: blink 1s step-end infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

    /* ── 面板與倒數盒 ── */
    .exam-panel { width: 100%; background: var(--panel); border: 1px solid var(--border); border-left: 5px solid var(--accent); padding: 24px; display: flex; flex-direction: column; gap: 15px; }
    .exam-header { display: flex; justify-content: space-between; align-items: center; }
    .exam-title { color: var(--accent); font-family: 'Orbitron'; letter-spacing: 2px; font-weight: bold; }

    .countdown-box { display: none; flex-direction: column; align-items: center; padding: 15px; background: rgba(255,0,0,0.05); border: 1px solid rgba(255,0,0,0.2); border-radius: 8px; }
    .countdown-box.visible { display: flex; }
    .countdown-time { font-family: 'Orbitron'; font-size: clamp(2.5rem, 12vw, 6rem); color: var(--accent); text-shadow: var(--glow); line-height: 1; margin: 10px 0; }
    .countdown-time.urgent { animation: pulse 0.5s ease-in-out infinite alternate; color: #ff5555; }
    @keyframes pulse { to { opacity: 0.5; } }

    .countdown-bar-wrap { width: 100%; height: 4px; background: #220000; margin-top: 10px; border-radius: 2px; overflow: hidden; }
    .countdown-bar { height: 100%; background: var(--accent); box-shadow: 0 0 10px var(--accent); transition: width 1s linear; }

    .db, .pb { font-family: 'Orbitron'; font-size: 0.7rem; padding: 5px 12px; background: transparent; border: 1px solid var(--border); color: var(--dim); cursor: pointer; border-radius: 4px; margin-right: 5px; }
    .db.active, .pb.active { border-color: var(--accent); color: var(--accent); background: rgba(255,0,0,0.1); }
    
    .status-off { color: var(--dim); text-align: center; font-size: 0.8rem; }
    .subject-badge { color: var(--accent); font-size: 0.95rem; font-weight: bold; margin-bottom: 5px; display:none; }
    .subject-badge.visible { display: block; }
    .period-info { font-size: 0.8rem; color: var(--dim); margin-top: 5px; }
    .break-msg { font-family: 'Orbitron'; font-size: 2.5rem; color: var(--accent); text-shadow: var(--glow); display: none; margin: 10px 0; }
  </style>
</head>
<body>

<div class="laser-bg"><div class="scan-line"></div><div class="laser-line"></div></div>

<div class="container">
  <div class="mode-switcher">
    <button class="mode-btn active" id="btnMonthly">月　考</button>
    <button class="mode-btn" id="btnMock">模擬考</button>
  </div>

  <div id="dateLine" style="font-family:'Orbitron'; color:var(--dim); font-size:0.9rem; letter-spacing:2px;"></div>
  <div class="digital">
    <span class="d" id="h0">0</span><span class="d" id="h1">0</span>
    <span class="colon">:</span>
    <span class="d" id="m0">0</span><span class="d" id="m1">0</span>
    <span class="colon">:</span>
    <span class="d" id="s0">0</span><span class="d" id="s1">0</span>
  </div>

  <div class="exam-panel" id="panelMonthly">
    <div class="exam-header">
      <div class="exam-title">月考倒數系統</div>
      <input type="checkbox" id="examToggle">
    </div>
    <div id="examControls" style="display:none; flex-direction:column; gap:12px;">
      <div id="durationBtns"></div>
      <div class="countdown-box" id="countdownBox">
        <div id="countdownLabel" style="font-size:0.8rem; color:var(--accent);">準備中</div>
        <div class="countdown-time" id="countdownTime">
          <span id="cd0">0</span><span id="cd1">0</span>:<span id="cd2">0</span><span id="cd3">0</span>
        </div>
        <div class="break-msg" id="breakMsg">下課中</div>
        <div class="countdown-bar-wrap"><div class="countdown-bar" id="countdownBar"></div></div>
        <div class="period-info" id="periodInfo"></div>
      </div>
    </div>
    <div class="status-off" id="statusOff">SYSTEM OFFLINE</div>
  </div>

  <div class="exam-panel" id="panelMock" style="display:none;">
    <div class="exam-header">
      <div class="exam-title">模擬考倒數系統</div>
      <input type="checkbox" id="mockToggle">
    </div>
    <div id="mockControls" style="display:none; flex-direction:column; gap:12px;">
      <div>
        <button class="pb active" id="btnDay1">DAY 1</button>
        <button class="pb" id="btnDay2">DAY 2</button>
      </div>
      <div class="countdown-box visible" id="mockCountdownBox">
        <div class="subject-badge" id="subjectName">等待科目</div>
        <div class="countdown-time" id="mockTime">
          <span id="mcd0">0</span><span id="mcd1">0</span>:<span id="mcd2">0</span><span id="mcd3">0</span>
        </div>
        <div class="break-msg" id="mockBreakMsg">下課中</div>
        <div class="countdown-bar-wrap"><div class="countdown-bar" id="mockBar"></div></div>
        <div class="period-info" id="mockInfo"></div>
      </div>
    </div>
    <div class="status-off" id="mockStatusOff">WAITING FOR COMMAND</div>
  </div>
</div>

<script>
  // ─────────────────────────────
  // 1. 資料定義 (從 index.html 參考)
  // ─────────────────────────────
  const PERIODS = [
    { label:'1', start:[8,10] }, { label:'2', start:[9,10] }, { label:'3', start:[10,10] },
    { label:'4', start:[11,10] }, { label:'5', start:[13,5] }, { label:'6', start:[14,5] }, { label:'7', start:[15,10] }
  ];
  
  const MOCK_SCHEDULE = {
    day1: [
      { subject:'國　文', start:[8,20], duration:100 },
      { subject:'英　文', start:[10,20], duration:100 },
      { subject:'專業科目（一）', start:[13,10], duration:100 }
    ],
    day2: [
      { subject:'數　學', start:[8,20], duration:80 },
      { subject:'專業科目（二）', start:[10,20], duration:100 }
    ]
  };

  let examOn = false, mockOn = false, selectedDuration = 50, mockDay = 'day1', selectedPeriod = 0;

  function pad(n){ return String(n).padStart(2,'0'); }

  // ─────────────────────────────
  // 2. 月考按鈕建立
  // ─────────────────────────────
  const dbContainer = document.getElementById('durationBtns');
  [50, 80, 100].forEach(d => {
    const btn = document.createElement('button');
    btn.className = 'db' + (d===selectedDuration ? ' active' : '');
    btn.textContent = d + ' MIN';
    btn.onclick = () => {
      selectedDuration = d;
      document.querySelectorAll('.db').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    };
    dbContainer.appendChild(btn);
  });

  // ─────────────────────────────
  // 3. 核心邏輯 (Tick)
  // ─────────────────────────────
  function tick() {
    const now = new Date();
    const nowSec = now.getHours()*3600 + now.getMinutes()*60 + now.getSeconds();
    
    // 更新大時鐘
    const h = pad(now.getHours()), m = pad(now.getMinutes()), s = pad(now.getSeconds());
    document.getElementById('h0').textContent=h[0]; document.getElementById('h1').textContent=h[1];
    document.getElementById('m0').textContent=m[0]; document.getElementById('m1').textContent=m[1];
    document.getElementById('s0').textContent=s[0]; document.getElementById('s1').textContent=s[1];
    document.getElementById('dateLine').textContent = `${now.getFullYear()} . ${pad(now.getMonth()+1)} . ${pad(now.getDate())}`;

    // --- 月考更新 ---
    if(examOn) {
      // 自動偵測節次
      let currentIdx = -1;
      for(let i=0; i<PERIODS.length; i++){
        const start = PERIODS[i].start[0]*3600 + PERIODS[i].start[1]*60;
        const end = start + selectedDuration*60;
        if(nowSec >= start && nowSec < end) { currentIdx = i; break; }
      }

      const box = document.getElementById('countdownBox');
      const timeEl = document.getElementById('countdownTime');
      const breakEl = document.getElementById('breakMsg');
      box.classList.add('visible');

      if(currentIdx !== -1) {
        // 考試中
        const p = PERIODS[currentIdx];
        const endSec = (p.start[0]*3600 + p.start[1]*60) + selectedDuration*60;
        const rem = endSec - nowSec;
        const mm = pad(Math.floor(rem/60)), ss = pad(rem%60);
        
        timeEl.style.display = 'flex';
        breakEl.style.display = 'none';
        document.getElementById('cd0').textContent=mm[0]; document.getElementById('cd1').textContent=mm[1];
        document.getElementById('cd2').textContent=ss[0]; document.getElementById('cd3').textContent=ss[1];
        document.getElementById('countdownBar').style.width = (rem/(selectedDuration*60)*100)+'%';
        document.getElementById('countdownLabel').textContent = `第 ${p.label} 節 剩餘`;
        document.getElementById('periodInfo').textContent = `${pad(p.start[0])}:${pad(p.start[1])} ~ ${pad(Math.floor(endSec/3600))}:${pad(Math.floor((endSec%3600)/60))}`;
        timeEl.classList.toggle('urgent', rem <= 300);
      } else {
        // 下課或結束
        timeEl.style.display = 'none';
        breakEl.style.display = 'block';
        document.getElementById('countdownLabel').textContent = "SYSTEM STATUS";
        document.getElementById('countdownBar').style.width = '0%';
        document.getElementById('periodInfo').textContent = "";
        
        // 尋找下一節
        let next = PERIODS.find(p => (p.start[0]*3600 + p.start[1]*60) > nowSec);
        breakEl.textContent = next ? "下課中" : "考試結束";
        if(next) document.getElementById('periodInfo').textContent = `下一節: 第 ${next.label} 節 ${pad(next.start[0])}:${pad(next.start[1])} 開始`;
      }
    }

    // --- 模擬考更新 ---
    if(mockOn) {
      const sched = MOCK_SCHEDULE[mockDay];
      let currentMock = null;
      for(let s of sched) {
        const start = s.start[0]*3600 + s.start[1]*60;
        const end = start + s.duration*60;
        if(nowSec >= start && nowSec < end) { currentMock = {s, end}; break; }
      }

      const mTimeEl = document.getElementById('mockTime');
      const mBreakEl = document.getElementById('mockBreakMsg');
      const badge = document.getElementById('subjectName');

      if(currentMock) {
        const rem = currentMock.end - nowSec;
        const mm = pad(Math.floor(rem/60)), ss = pad(rem%60);
        mTimeEl.style.display = 'flex';
        mBreakEl.style.display = 'none';
        badge.textContent = currentMock.s.subject;
        document.getElementById('mcd0').textContent=mm[0]; document.getElementById('mcd1').textContent=mm[1];
        document.getElementById('mcd2').textContent=ss[0]; document.getElementById('mcd3').textContent=ss[1];
        document.getElementById('mockBar').style.width = (rem/(currentMock.s.duration*60)*100)+'%';
        mTimeEl.classList.toggle('urgent', rem <= 600);
      } else {
        mTimeEl.style.display = 'none';
        mBreakEl.style.display = 'block';
        badge.textContent = "休息時間";
        document.getElementById('mockBar').style.width = '0%';
        let nextM = sched.find(s => (s.start[0]*3600 + s.start[1]*60) > nowSec);
        mBreakEl.textContent = nextM ? "下課中" : "今日考完";
      }
    }
  }

  // ─────────────────────────────
  // 4. 事件監聽
  // ─────────────────────────────
  document.getElementById('examToggle').onchange = (e) => {
    examOn = e.target.checked;
    document.getElementById('examControls').style.display = examOn?'flex':'none';
    document.getElementById('statusOff').style.display = examOn?'none':'block';
  };
  document.getElementById('mockToggle').onchange = (e) => {
    mockOn = e.target.checked;
    document.getElementById('mockControls').style.display = mockOn?'flex':'none';
    document.getElementById('mockStatusOff').style.display = mockOn?'none':'block';
  };
  document.getElementById('btnMonthly').onclick = () => {
    document.getElementById('panelMonthly').style.display='flex';
    document.getElementById('panelMock').style.display='none';
    document.getElementById('btnMonthly').classList.add('active');
    document.getElementById('btnMock').classList.remove('active');
  };
  document.getElementById('btnMock').onclick = () => {
    document.getElementById('panelMonthly').style.display='none';
    document.getElementById('panelMock').style.display='flex';
    document.getElementById('btnMock').classList.add('active');
    document.getElementById('btnMonthly').classList.remove('active');
  };
  document.getElementById('btnDay1').onclick = () => { mockDay='day1'; document.getElementById('btnDay1').classList.add('active'); document.getElementById('btnDay2').classList.remove('active'); };
  document.getElementById('btnDay2').onclick = () => { mockDay='day2'; document.getElementById('btnDay2').classList.add('active'); document.getElementById('btnDay1').classList.remove('active'); };

  setInterval(tick, 1000); 
  tick();
</script>
</body>
</html>
